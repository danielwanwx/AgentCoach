domain: system_design
name: System Design

topics:
  - id: system_design.core_concepts
    name: Core Concepts
    children:
      - id: system_design.networking
        name: Networking & Protocols
        difficulty_level: 1
        prerequisites: []
        resources:
          - type: video
            title: "Computer Networking Full Course (NetworkChuck)"
            url: "https://www.youtube.com/watch?v=IPvYjXCsTg8"
          - type: article
            title: "HelloInterview: Core Concepts"
            url: "https://www.hellointerview.com/learn/system-design/in-a-hurry/core-concepts"

      - id: system_design.api_design
        name: API Design (REST, gRPC, GraphQL)
        difficulty_level: 1
        prerequisites: [system_design.networking]
        resources:
          - type: video
            title: "REST vs gRPC vs GraphQL (ByteByteGo)"
            url: "https://www.youtube.com/watch?v=hkXzsB8D_mo"
          - type: article
            title: "HelloInterview: Core Concepts"
            url: "https://www.hellointerview.com/learn/system-design/in-a-hurry/core-concepts"

      - id: system_design.data_modeling
        name: Data Modeling
        difficulty_level: 1
        prerequisites: []
        resources:
          - type: book
            title: "DDIA Chapter 2 - Data Models"
            url: null
          - type: video
            title: "Data Modeling for System Design (Gaurav Sen)"
            url: "https://www.youtube.com/watch?v=1jWuFaGJEaQ"

      - id: system_design.numbers_to_know
        name: Numbers to Know & Capacity Estimation
        difficulty_level: 1
        prerequisites: [system_design.networking]
        resources:
          - type: article
            title: "HelloInterview: Numbers to Know"
            url: "https://www.hellointerview.com/learn/system-design/core-concepts/numbers-to-know"
          - type: guide
            title: "ByteByteGo: Capacity Estimation in the 7-Step Framework"
            url: "https://bytebytego.com/guides/how-to-ace-system-design-interviews-like-a-boss/"

      - id: system_design.caching
        name: Caching (Redis, Memcached)
        difficulty_level: 2
        prerequisites: [system_design.data_modeling]
        resources:
          - type: video
            title: "Caching Strategies (ByteByteGo)"
            url: "https://www.youtube.com/watch?v=dGAgxozNWFE"
          - type: article
            title: "HelloInterview: Redis Deep Dive"
            url: "https://www.hellointerview.com/learn/system-design/deep-dives/redis"
          - type: book
            title: "DDIA Chapter 5 - Replication"
            url: null

      - id: system_design.sharding
        name: Sharding & Partitioning
        difficulty_level: 2
        prerequisites: [system_design.data_modeling, system_design.db_indexing]
        resources:
          - type: video
            title: "Database Sharding Explained (Gaurav Sen)"
            url: "https://www.youtube.com/watch?v=5faMjKuB9bc"
          - type: book
            title: "DDIA Chapter 6 - Partitioning"
            url: null

      - id: system_design.consistent_hashing
        name: Consistent Hashing
        difficulty_level: 2
        prerequisites: [system_design.sharding]
        resources:
          - type: video
            title: "Consistent Hashing (Gaurav Sen)"
            url: "https://www.youtube.com/watch?v=zaRkONvyGr8"
          - type: article
            title: "Consistent Hashing Explained"
            url: "https://www.toptal.com/big-data/consistent-hashing"

      - id: system_design.cap_theorem
        name: CAP Theorem
        difficulty_level: 2
        prerequisites: [system_design.networking]
        resources:
          - type: video
            title: "CAP Theorem Simplified (ByteByteGo)"
            url: "https://www.youtube.com/watch?v=BHqjEjzAicY"
          - type: book
            title: "DDIA Chapter 9 - Consistency and Consensus"
            url: null

      - id: system_design.db_indexing
        name: Database Indexing
        difficulty_level: 1
        prerequisites: [system_design.data_modeling]
        resources:
          - type: video
            title: "Database Indexing Explained (Hussein Nasser)"
            url: "https://www.youtube.com/watch?v=-qNSXDUhTO8"
          - type: book
            title: "DDIA Chapter 3 - Storage and Retrieval"
            url: null

      - id: system_design.load_balancing
        name: Load Balancing
        difficulty_level: 2
        prerequisites: [system_design.networking]
        resources:
          - type: video
            title: "Load Balancing (Gaurav Sen)"
            url: "https://www.youtube.com/watch?v=K0Ta65OqQkY"
          - type: article
            title: "NGINX Load Balancing Guide"
            url: "https://www.nginx.com/resources/glossary/load-balancing/"

      - id: system_design.message_queues
        name: Message Queues (Kafka)
        difficulty_level: 2
        prerequisites: [system_design.networking]
        resources:
          - type: video
            title: "Apache Kafka in 6 minutes (James Cutajar)"
            url: "https://www.youtube.com/watch?v=Ch5VhJzaoaI"
          - type: article
            title: "HelloInterview: Kafka Deep Dive"
            url: "https://www.hellointerview.com/learn/system-design/deep-dives/kafka"

  - id: system_design.patterns
    name: Patterns
    children:
      - id: system_design.scaling_reads
        name: Scaling Reads
        difficulty_level: 2
        prerequisites: [system_design.db_indexing, system_design.caching]
        resources:
          - type: article
            title: "HelloInterview: Scaling Reads"
            url: "https://www.hellointerview.com/learn/system-design/patterns/scaling-reads"

      - id: system_design.scaling_writes
        name: Scaling Writes
        difficulty_level: 2
        prerequisites: [system_design.sharding, system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Scaling Writes"
            url: "https://www.hellointerview.com/learn/system-design/patterns/scaling-writes"

      - id: system_design.rate_limiting
        name: Rate Limiting
        difficulty_level: 2
        prerequisites: [system_design.api_design]
        resources:
          - type: video
            title: "Rate Limiting (System Design)"
            url: "https://www.youtube.com/watch?v=FU4WlwfS3G0"

      - id: system_design.circuit_breaker
        name: Circuit Breaker
        difficulty_level: 2
        prerequisites: [system_design.api_design]
        resources:
          - type: article
            title: "Circuit Breaker Pattern (Martin Fowler)"
            url: "https://martinfowler.com/bliki/CircuitBreaker.html"

      - id: system_design.event_sourcing
        name: Event Sourcing / CQRS
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.data_modeling]
        resources:
          - type: video
            title: "Event Sourcing Explained (CodeOpinion)"
            url: "https://www.youtube.com/watch?v=AUj4M-st3ic"

      - id: system_design.realtime_updates
        name: Realtime Updates
        difficulty_level: 2
        prerequisites: [system_design.networking, system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Realtime Updates"
            url: "https://www.hellointerview.com/learn/system-design/patterns/realtime-updates"

      - id: system_design.long_running_tasks
        name: Managing Long-Running Tasks
        difficulty_level: 2
        prerequisites: [system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Managing Long Running Tasks"
            url: "https://www.hellointerview.com/learn/system-design/patterns/long-running-tasks"

      - id: system_design.dealing_with_contention
        name: Dealing with Contention
        difficulty_level: 3
        prerequisites: [system_design.data_modeling, system_design.cap_theorem]
        resources:
          - type: article
            title: "HelloInterview: Dealing with Contention"
            url: "https://www.hellointerview.com/learn/system-design/patterns/dealing-with-contention"

      - id: system_design.large_blobs
        name: Large Blobs
        difficulty_level: 2
        prerequisites: [system_design.caching, system_design.load_balancing]
        resources:
          - type: article
            title: "HelloInterview: Large Blobs"
            url: "https://www.hellointerview.com/learn/system-design/patterns/large-blobs"

      - id: system_design.multi_step_processes
        name: Multi-Step Processes
        difficulty_level: 3
        prerequisites: [system_design.long_running_tasks, system_design.event_sourcing]
        resources:
          - type: article
            title: "HelloInterview: Multi-Step Processes"
            url: "https://www.hellointerview.com/learn/system-design/patterns/multi-step-processes"

      - id: system_design.leader_election
        name: Leader Election
        difficulty_level: 3
        prerequisites: [system_design.cap_theorem]
        resources:
          - type: article
            title: "Leader Election in Distributed Systems"
            url: "https://www.baeldung.com/cs/leader-election"

  - id: system_design.problems
    name: Problem Breakdowns
    children:
      - id: system_design.url_shortener
        name: URL Shortener (Bitly)
        difficulty_level: 2
        prerequisites: [system_design.caching, system_design.db_indexing]
        resources:
          - type: article
            title: "HelloInterview: Bitly Breakdown"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/bitly"
          - type: video
            title: "Design TinyURL (NeetCode)"
            url: "https://www.youtube.com/watch?v=fMZMm_0ZhK4"

      - id: system_design.distributed_rate_limiter
        name: Distributed Rate Limiter
        difficulty_level: 3
        prerequisites: [system_design.rate_limiting, system_design.caching]
        resources:
          - type: article
            title: "HelloInterview: Distributed Rate Limiter"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/distributed-rate-limiter"

      - id: system_design.ticketmaster
        name: Ticketmaster
        difficulty_level: 3
        prerequisites: [system_design.caching, system_design.sharding]
        resources:
          - type: article
            title: "HelloInterview: Ticketmaster"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/ticketmaster"

      - id: system_design.top_k
        name: Top-K (Leaderboards)
        difficulty_level: 2
        prerequisites: [system_design.caching]
        resources:
          - type: article
            title: "HelloInterview: Top-K"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/top-k"

      - id: system_design.ad_click_aggregator
        name: Ad Click Aggregator
        difficulty_level: 3
        prerequisites: [system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Ad Click Aggregator"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/ad-click-aggregator"

      - id: system_design.web_crawler
        name: Web Crawler
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.sharding]
        resources:
          - type: article
            title: "HelloInterview: Web Crawler"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/web-crawler"

      - id: system_design.job_scheduler
        name: Distributed Job Scheduler
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.leader_election]
        resources:
          - type: article
            title: "HelloInterview: Job Scheduler"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/job-scheduler"

      - id: system_design.payment_system
        name: Payment System
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.event_sourcing]
        resources:
          - type: article
            title: "HelloInterview: Payment System"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/payment-system"

      - id: system_design.whatsapp
        name: WhatsApp
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.load_balancing]
        resources:
          - type: article
            title: "HelloInterview: WhatsApp"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/whatsapp"

      - id: system_design.instagram
        name: Instagram
        difficulty_level: 3
        prerequisites: [system_design.caching, system_design.sharding]
        resources:
          - type: article
            title: "HelloInterview: Instagram"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/instagram"

      - id: system_design.fb_news_feed
        name: Facebook News Feed
        difficulty_level: 3
        prerequisites: [system_design.caching, system_design.sharding]
        resources:
          - type: article
            title: "HelloInterview: FB News Feed"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/fb-news-feed"

      - id: system_design.fb_live_comments
        name: FB Live Comments
        difficulty_level: 3
        prerequisites: [system_design.message_queues, system_design.load_balancing]

      - id: system_design.google_docs
        name: Google Docs (Collab Editing)
        difficulty_level: 3
        prerequisites: [system_design.cap_theorem, system_design.leader_election]
        resources:
          - type: article
            title: "HelloInterview: Google Docs"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/google-docs"

      - id: system_design.dropbox
        name: Dropbox / Google Drive
        difficulty_level: 3
        prerequisites: [system_design.sharding, system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Dropbox"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/dropbox"

      - id: system_design.youtube
        name: YouTube
        difficulty_level: 3
        prerequisites: [system_design.caching, system_design.load_balancing]
        resources:
          - type: article
            title: "HelloInterview: YouTube"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/youtube"

      - id: system_design.uber
        name: Uber
        difficulty_level: 3
        prerequisites: [system_design.sharding, system_design.load_balancing]
        resources:
          - type: article
            title: "HelloInterview: Uber"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/uber"

      - id: system_design.metrics_monitoring
        name: Metrics & Monitoring
        difficulty_level: 3
        prerequisites: [system_design.message_queues]
        resources:
          - type: article
            title: "HelloInterview: Metrics"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/metrics-monitoring"

      - id: system_design.distributed_cache
        name: Distributed Cache
        difficulty_level: 3
        prerequisites: [system_design.caching, system_design.consistent_hashing]
        resources:
          - type: article
            title: "HelloInterview: Distributed Cache"
            url: "https://www.hellointerview.com/learn/system-design/problem-breakdowns/distributed-cache"
